    color: #fff; cursor: pointer;

  .result-wrong { background: #FF6B6B10; border: 1.5px solid #FF6B6B; }

    u.volume = 0;
    u.rate = 10;
    if (ttsState.voice) { u.voice = ttsState.voice; }
    window.speechSynthesis.speak(u);
  } catch (e) {}
  render();
}

function manualUnlock() {
  ttsState.unlocked = false;
  unlockAudioOnce();
  state.audioError = "";
  render();
}

function startResumeGuard() {
  stopResumeGuard();
  if (!ttsState.supported) { return; }
  ttsState.resumeTimer = setInterval(function () {
    try {
      if (window.speechSynthesis.paused) { window.speechSynthesis.resume(); }
    } catch (e) {}
  }, 3000);
}
function stopResumeGuard() {
  if (ttsState.resumeTimer) {
    clearInterval(ttsState.resumeTimer);
    ttsState.resumeTimer = null;
  }
}

function speakEnglish(text, onEnd, onError) {
  if (!ttsState.supported) {
    if (onError) { onError("이 브라우저는 음성 합성을 지원하지 않습니다."); }
    return;
  }
  try {
    window.speechSynthesis.cancel();
    if (window.speechSynthesis.paused) { window.speechSynthesis.resume(); }
    var u = new SpeechSynthesisUtterance(text);
    u.lang = "en-US";
    u.rate = 0.95;
    if (ttsState.voice) { u.voice = ttsState.voice; }
    var finished = false;
    u.onend = function () { finished = true; if (onEnd) { onEnd(); } };
    u.onerror = function () { finished = true; if (onError) { onError("음성 재생에 실패했습니다. 기기 음량이나 무음 모드를 확인해 주세요."); } };
    window.speechSynthesis.speak(u);
    setTimeout(function () {
      if (!finished && !window.speechSynthesis.speaking && !window.speechSynthesis.pending) {
        finished = true;
        if (onError) { onError("음성이 시작되지 않았습니다. 아래 소리 활성화 버튼을 눌러 보세요."); }
      }
    }, 4000);
  } catch (e) {
    if (onError) { onError("음성 재생 중 오류가 발생했습니다."); }
  }
}

var state = {
  view: "toc",
  unitIdx: 0,
  sentIdx: 0,
  completed: {},
  answers: {},
  hintVisible: false,
  playCount: 0,
  isPlaying: false,
  audioError: ""
};
var cancelPlay = false;

function answerKey(u, s) { return u + "_" + s; }
function normWord(w) { return w.toLowerCase().replace(/[.,!?;:'"]/g, ""); }
function normSentence(s) {
  var parts = s.trim().split(/\s+/);
  var out = [];
  var i;
  for (i = 0; i < parts.length; i++) { out.push(normWord(parts[i])); }
  return out.join(" ");
}

function getHints(sentenceEn) {
  var words = sentenceEn.split(" ");
  var result = [];
  var i = 0;
  while (i < words.length) {
    var w3 = null;
    var w2 = null;
    if (i + 3 <= words.length) {
      w3 = normWord(words[i]) + " " + normWord(words[i + 1]) + " " + normWord(words[i + 2]);
    }
    if (i + 2 <= words.length) {
      w2 = normWord(words[i]) + " " + normWord(words[i + 1]);
    }
    if (w3 && PHRASES.hasOwnProperty(w3)) {
      result.push({ en: words[i] + " " + words[i + 1] + " " + words[i + 2], ko: PHRASES[w3] });
      i += 3;
      continue;
    }
    if (w2 && PHRASES.hasOwnProperty(w2)) {
      result.push({ en: words[i] + " " + words[i + 1], ko: PHRASES[w2] });
      i += 2;
      continue;
    }
    var w1 = normWord(words[i]);
    var ko = VOCAB.hasOwnProperty(w1) ? VOCAB[w1] : "-";
    result.push({ en: words[i], ko: ko });
    i += 1;
  }
  return result;
}

function esc(s) {
  var map = { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" };
  return String(s).replace(/[&<>"]/g, function (c) { return map[c]; });
}

function openUnit(idx) {
  state.unitIdx = idx;
  state.sentIdx = 0;
  state.hintVisible = false;
  state.playCount = 0;
  state.isPlaying = false;
  state.audioError = "";
  state.view = "unit";
  render();
}

function backToTOC() {
  cancelPlay = true;
  stopResumeGuard();
  if (window.speechSynthesis) { window.speechSynthesis.cancel(); }
  state.isPlaying = false;
  state.view = "toc";
  render();
}

function toggleHint() {
  state.hintVisible = !state.hintVisible;
  render();
}

function checkAnswer() {
  var unit = UNITS[state.unitIdx];
  var sentence = unit.sentences[state.sentIdx];
  var input = document.getElementById("answerInput");
  if (!input) { return; }
  var userInput = input.value.trim();
  if (!userInput) { return; }
  var correct = normSentence(sentence[1]) === normSentence(userInput);
  state.answers[answerKey(unit.id, state.sentIdx)] = {
    status: correct ? "correct" : "incorrect",
    userInput: userInput
  };
  state.hintVisible = false;
  render();
}

function handleInputKeydown(e) {
  if (e.key === "Enter") {
    e.preventDefault();
    checkAnswer();
  }
}

function markCompleted(uId, sIdx) {
  if (!state.completed[uId]) { state.completed[uId] = {}; }
  state.completed[uId][sIdx] = true;
}
function completedCount(uId) {
  if (!state.completed[uId]) { return 0; }
  var n = 0;
  var k;
  for (k in state.completed[uId]) {
    if (state.completed[uId][k]) { n++; }
  }
  return n;
}
function isCompleted(uId, sIdx) {
  return !!(state.completed[uId] && state.completed[uId][sIdx]);
}

function playFive() {
  if (state.isPlaying) { return; }
  unlockAudioOnce();
  var unit = UNITS[state.unitIdx];
  var sentence = unit.sentences[state.sentIdx];
  cancelPlay = false;
  state.isPlaying = true;
  state.playCount = 0;
  state.audioError = "";
  startResumeGuard();
  render();
  var count = 0;

  function playNext() {
    if (cancelPlay) { return; }
    count += 1;
    state.playCount = count;
    updatePlayUI();
    speakEnglish(
      sentence[1],
      function () {
        if (cancelPlay) { return; }
        if (count < 5) {
          setTimeout(playNext, 450);
        } else {
          state.isPlaying = false;
          stopResumeGuard();
          markCompleted(unit.id, state.sentIdx);
          render();
        }
      },
      function (errMsg) {
        if (cancelPlay) { return; }
        state.isPlaying = false;
        state.audioError = errMsg;
        stopResumeGuard();
        render();
      }
    );
  }
  playNext();
}

function stopPlaying() {
  cancelPlay = true;
  stopResumeGuard();
  if (window.speechSynthesis) { window.speechSynthesis.cancel(); }
  state.isPlaying = false;
  render();
}

function goNext() {
  var unit = UNITS[state.unitIdx];
  if (state.sentIdx < unit.sentences.length - 1) {
    cancelPlay = true;
    stopResumeGuard();
    if (window.speechSynthesis) { window.speechSynthesis.cancel(); }
    state.sentIdx += 1;
    state.playCount = 0;
    state.isPlaying = false;
    state.hintVisible = false;
    state.audioError = "";
    render();
  }
}
function goPrev() {
  if (state.sentIdx > 0) {
    cancelPlay = true;
    stopResumeGuard();
    if (window.speechSynthesis) { window.speechSynthesis.cancel(); }
    state.sentIdx -= 1;
    state.playCount = 0;
    state.isPlaying = false;
    state.hintVisible = false;
    state.audioError = "";
    render();
  }
}

function updatePlayUI() {
  var dotsEl = document.getElementById("dots");
  var statusEl = document.getElementById("playStatus");
  var unit = UNITS[state.unitIdx];
  var n;
  if (dotsEl) {
    var html = "";
    for (n = 1; n <= 5; n++) {
      html += '<div class="dot" style="background:' + (n <= state.playCount ? unit.color : "#e2e2e8") + '"></div>';
    }
    dotsEl.innerHTML = html;
  }
  if (statusEl) { statusEl.textContent = "재생 중... (" + state.playCount + "/5)"; }
}

function render() {
  var app = document.getElementById("app");
  app.innerHTML = state.view === "toc" ? renderTOC() : renderUnit();
  if (state.view === "unit") {
    var unit = UNITS[state.unitIdx];
    var ansKey = answerKey(unit.id, state.sentIdx);
    var input = document.getElementById("answerInput");
    if (input && !state.answers[ansKey]) {
      setTimeout(function () { input.focus(); }, 0);
    }
  }
}

function renderTOC() {
  var html = "";
  html += '<div class="toc-header">';
  html += '<div class="toc-badge">교과서 지문 듣고 받아쓰기</div>';
  html += '<h1 class="toc-title">한영 말하기 연습</h1>';
  html += '<p class="toc-sub">교과서 지문 스타일 - 10단원 - 총 300문장</p>';
  if (!ttsState.supported) {
    html += '<div class="audio-warn">이 브라우저는 음성 재생을 지원하지 않을 수 있습니다.</div>';
  } else if (!ttsState.unlocked) {
    html += '<div class="unlock-banner" onclick="window.manualUnlock()">소리 활성화 (한 번 탭해 주세요)</div>';
  }
  html += '</div>';

  var idx;
  for (idx = 0; idx < UNITS.length; idx++) {
    var u = UNITS[idx];
    var doneN = completedCount(u.id);
    var progress = Math.round((doneN / u.sentences.length) * 100);
    var isDone = doneN === u.sentences.length;
    html += '<button class="unit-btn" onclick="window.openUnit(' + idx + ')">';
    html += '<div class="unit-num" style="background:' + u.color + '">' + u.id + '</div>';
    html += '<div class="unit-info">';
    html += '<div class="unit-name">' + esc(u.title) + '</div>';
    html += '<div class="unit-name-en">' + esc(u.titleEn) + '</div>';
    html += '<div class="bar-bg"><div class="bar-fill" style="width:' + progress + '%;background:' + u.color + '"></div></div>';
    html += '</div>';
    html += '<div class="unit-status">';
    if (isDone) {
      html += '<span style="color:#06A77D;font-size:13px;">done</span>';
    } else {
      html += '<span>' + doneN + '/' + u.sentences.length + '</span>';
    }
    html += '<span style="color:#ccc;">&gt;</span>';
    html += '</div>';
    html += '</button>';
  }
  return html;
}

function renderUnit() {
  var unit = UNITS[state.unitIdx];
  var sentence = unit.sentences[state.sentIdx];
  var doneN = completedCount(unit.id);
  var unitDone = doneN === unit.sentences.length;
  var isSentenceListened = isCompleted(unit.id, state.sentIdx);
  var ansKey = answerKey(unit.id, state.sentIdx);
  var answer = state.answers[ansKey];

  var words = sentence[1].split(" ");
  var blankParts = [];
  var wi;
  for (wi = 0; wi < words.length; wi++) {
    var w = words[wi];
    var m = w.match(/^([A-Za-z']+)([.,!?]*)$/);
    var core = m ? m[1] : w;
    var punct = m ? m[2] : "";
    var underscores = "";
    var len = core.length < 2 ? 2 : core.length;
    var ci;
    for (ci = 0; ci < len; ci++) { underscores += "_"; }
    blankParts.push(underscores + punct);
  }
  var blanksHtml = blankParts.join("  ");

  var html = "";
  html += '<div class="top-row">';
  html += '<button class="back-btn" onclick="window.backToTOC()">back</button>';
  html += '<div class="top-mid">';
  html += '<div class="top-unit-label">단원 ' + unit.id + ' / 10</div>';
  html += '<div class="top-unit-title">' + esc(unit.title) + '</div>';
  html += '</div>';
  html += '<div class="top-count" style="background:' + unit.color + '">' + (state.sentIdx + 1) + ' / ' + unit.sentences.length + '</div>';
  html += '</div>';
  html += '<div class="progress-outer"><div class="progress-inner" style="width:' + (((state.sentIdx + 1) / unit.sentences.length) * 100) + '%;background:' + unit.color + '"></div></div>';

  if (!ttsState.unlocked) {
    html += '<div class="unlock-banner" onclick="window.manualUnlock()">소리 활성화 (한 번 탭해 주세요)</div>';
  }

  html += '<div class="card">';
  html += '<div class="label-small">KOREAN</div>';
  html += '<div class="ko-sentence">' + esc(sentence[0]) + '</div>';
  html += '<div class="label-small">ENGLISH</div>';
  html += '<div class="blanks">' + (answer ? esc(sentence[1]) : blanksHtml) + '</div>';
  html += '</div>';

  if (!answer) {
    html += '<div class="input-row">';
    html += '<input id="answerInput" class="answer-input" type="text" placeholder="영어를 입력하세요" autocomplete="off" onkeydown="window.handleInputKeydown(event)">';
    html += '<button class="check-btn" style="background:' + unit.color + '" onclick="window.checkAnswer()">확인</button>';
    html += '</div>';
    html += '<button class="hint-btn" onclick="window.toggleHint()">' + (state.hintVisible ? "힌트 닫기" : "힌트 보기") + '</button>';
    if (state.hintVisible) {
      var hints = getHints(sentence[1]);
      html += '<div class="hint-panel">';
      var hi;
      for (hi = 0; hi < hints.length; hi++) {
        html += '<div class="hint-chip"><div class="hint-en">' + esc(hints[hi].en) + '</div><div class="hint-ko">' + esc(hints[hi].ko) + '</div></div>';
      }
      html += '</div>';
    }
  } else if (answer.status === "correct") {
    html += '<div class="result-box result-correct">';
    html += '<div class="result-title" style="color:#06A77D;">정답입니다</div>';
    html += '<div class="answer-final">정답: <b>' + esc(sentence[1]) + '</b></div>';
    html += '</div>';
  } else {
    var userWords = answer.userInput.trim().split(/\s+/);
    var correctWords = sentence[1].split(" ");
    var maxLen = Math.max(userWords.length, correctWords.length);
    var diffHtml = "";
    var di;
    for (di = 0; di < maxLen; di++) {
      var uw = userWords[di] || "";
      var cw = correctWords[di] || "";
      var matchOk = uw && cw && normWord(uw) === normWord(cw);
      if (matchOk) {
        diffHtml += '<span class="diff-ok">' + esc(cw) + '</span>';
      } else {
        if (uw) { diffHtml += '<span class="diff-wrong">' + esc(uw) + '</span>'; }
        if (cw) { diffHtml += '<span class="diff-correct">' + esc(cw) + '</span>'; }
      }
    }
    html += '<div class="result-box result-wrong">';
    html += '<div class="result-title" style="color:#FF6B6B;">다시 확인해 보세요</div>';
    html += '<div class="diff-line">' + diffHtml + '</div>';
    html += '<div class="answer-final">정답: <b>' + esc(sentence[1]) + '</b></div>';
    html += '</div>';
  }

  var playStatusText;
  if (!answer) {
    playStatusText = "먼저 정답을 확인해 주세요";
  } else if (state.audioError) {
    playStatusText = "";
  } else if (state.isPlaying) {
    playStatusText = "재생 중... (" + state.playCount + "/5)";
  } else if (isSentenceListened) {
    playStatusText = "완료! 다음 문장으로 이동하세요";
  } else {
    playStatusText = "버튼을 눌러 정답 문장 5회 듣기를 시작하세요";
  }

  html += '<div class="play-section">';
  html += '<button class="play-circle" style="background:' + (state.isPlaying ? "#FF6B6B" : unit.color) + '" onclick="' + (state.isPlaying ? "window.stopPlaying()" : "window.playFive()") + '"' + (!answer ? " disabled" : "") + '>' + (state.isPlaying ? "pause" : "play") + '</button>';
  html += '<div class="dots" id="dots">';
  var dn;
  for (dn = 1; dn <= 5; dn++) {
    html += '<div class="dot" style="background:' + (dn <= state.playCount ? unit.color : "#e2e2e8") + '"></div>';
  }
  html += '</div>';
  if (state.audioError) {
    html += '<div class="audio-error">' + esc(state.audioError) + '</div>';
  } else {
    html += '<div class="play-status" id="playStatus">' + playStatusText + '</div>';
  }
  html += '</div>';

  html += '<div class="nav-row">';
  html += '<button class="nav-btn" style="background:#fff;color:#444;box-shadow:0 1px 4px rgba(0,0,0,0.08);" onclick="window.goPrev()"' + (state.sentIdx === 0 ? " disabled" : "") + '>이전 문장</button>';
  html += '<button class="nav-btn" style="background:' + unit.color + ';color:#fff;box-shadow:0 2px 10px ' + unit.color + '55;" onclick="window.goNext()"' + ((!isSentenceListened || state.sentIdx === unit.sentences.length - 1) ? " disabled" : "") + '>다음 문장</button>';
  html += '</div>';

  if (unitDone) {
    html += '<div class="done-banner">';
    html += '<div class="done-title">단원 ' + unit.id + ' 완료</div>';
    html += '<div class="done-sub">' + (state.unitIdx < UNITS.length - 1 ? "목차에서 다음 단원을 선택해 보세요." : "모든 단원을 완료했습니다.") + '</div>';
    html += '</div>';
  }

  return html;
}

window.openUnit = openUnit;
window.backToTOC = backToTOC;
window.toggleHint = toggleHint;
window.checkAnswer = checkAnswer;
window.handleInputKeydown = handleInputKeydown;
window.playFive = playFive;
window.stopPlaying = stopPlaying;
window.goNext = goNext;
window.goPrev = goPrev;
window.manualUnlock = manualUnlock;

document.addEventListener("click", unlockAudioOnce, { once: true });
document.addEventListener("touchstart", unlockAudioOnce, { once: true });
initVoices();
render();

})();
</script>
</body>
</html>
